name: Build MDPhotoV

on:
  workflow_dispatch:
  #push:
  #  branches: [ main ]
  #pull_request:
  #  branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up MinGW
      uses: egor-tensin/setup-mingw@v3
      with:
        platform: x64
    
    - name: Create build directories
      working-directory: MdPhotoV
      run: |
        mkdir -p bin
        mkdir -p obj
      shell: bash
    
    - name: Compile resource file
      working-directory: MdPhotoV
      run: |
        windres -i src/resources/resources.rc --input-format=rc -o obj/resources.res -O coff
      shell: bash
    
    - name: Compile source files
      working-directory: MdPhotoV
      run: |
        g++ -c src/AppWindow.cpp -o obj/AppWindow.o -I./src/include -I./src/deps/include -mwindows -std=c++17 -municode -DUNICODE -D_UNICODE -O2 -s -Wall -ffunction-sections -fdata-sections
        g++ -c src/DecoderAvif.cpp -o obj/DecoderAvif.o -I./src/include -I./src/deps/include -mwindows -std=c++17 -municode -DUNICODE -D_UNICODE -O2 -s -Wall -ffunction-sections -fdata-sections
        g++ -c src/DecoderWebp.cpp -o obj/DecoderWebp.o -I./src/include -I./src/deps/include -mwindows -std=c++17 -municode -DUNICODE -D_UNICODE -O2 -s -Wall -ffunction-sections -fdata-sections
        g++ -c src/DecoderWic.cpp -o obj/DecoderWic.o -I./src/include -I./src/deps/include -mwindows -std=c++17 -municode -DUNICODE -D_UNICODE -O2 -s -Wall -ffunction-sections -fdata-sections
        g++ -c src/Dialogs.cpp -o obj/Dialogs.o -I./src/include -I./src/deps/include -mwindows -std=c++17 -municode -DUNICODE -D_UNICODE -O2 -s -Wall -ffunction-sections -fdata-sections
        g++ -c src/helper.cpp -o obj/helper.o -I./src/include -I./src/deps/include -mwindows -std=c++17 -municode -DUNICODE -D_UNICODE -O2 -s -Wall -ffunction-sections -fdata-sections
        g++ -c src/ImageLoader.cpp -o obj/ImageLoader.o -I./src/include -I./src/deps/include -mwindows -std=c++17 -municode -DUNICODE -D_UNICODE -O2 -s -Wall -ffunction-sections -fdata-sections
        g++ -c src/main.cpp -o obj/main.o -I./src/include -I./src/deps/include -mwindows -std=c++17 -municode -DUNICODE -D_UNICODE -O2 -s -Wall -ffunction-sections -fdata-sections
        g++ -c src/Playlist.cpp -o obj/Playlist.o -I./src/include -I./src/deps/include -mwindows -std=c++17 -municode -DUNICODE -D_UNICODE -O2 -s -Wall -ffunction-sections -fdata-sections
        g++ -c src/Renderer.cpp -o obj/Renderer.o -I./src/include -I./src/deps/include -mwindows -std=c++17 -municode -DUNICODE -D_UNICODE -O2 -s -Wall -ffunction-sections -fdata-sections
      shell: bash
    
    - name: Link executable
      working-directory: MdPhotoV
      run: |
        g++ obj/AppWindow.o obj/DecoderAvif.o obj/DecoderWebp.o obj/DecoderWic.o obj/Dialogs.o obj/helper.o obj/ImageLoader.o obj/main.o obj/Playlist.o obj/Renderer.o obj/resources.res -o bin/MdPhotoV.exe -static-libgcc -static-libstdc++ -L./src/deps -mwindows -s -municode -ld2d1 -lwindowscodecs -lole32 -luuid -lcomdlg32 -lshell32 -ld3d11 -ldxgi -lbcrypt -lws2_32 -Wl,--gc-sections ./src/deps/libavif.a ./src/deps/libyuv.a ./src/deps/libwebp.a -mwindows -s
      shell: bash

    - name: Commit and push executable
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add MdPhotoV/bin/MdPhotoV.exe
        git commit -m "Build: Update executable [skip ci]" || echo "No changes to commit"
        git push
      shell: bash
      
    - name: Upload build artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: MDPhotoV-build
        path: MdPhotoV/bin/MdPhotoV.exe
        retention-days: 30
    
    - name: Check executable
      working-directory: MdPhotoV
      run: |
        if [ -f bin/MdPhotoV.exe ]; then
          echo "Build successful!"
          ls -lh bin/MdPhotoV.exe
        else
          echo "Build failed - executable not found"
          exit 1
        fi
      shell: bash
